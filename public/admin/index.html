<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Sonar — Content Manager</title>
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />

  <style>
    /* 1. BARRE SUPÉRIEURE (L'en-tête principal du CMS) */
    #nc-root header, 
    #nc-root nav[role="navigation"],
    header {
      background-color: #062016 !important;
    }

    /* 2. BOUTON DE CONNEXION GITHUB UNIQUEMENT (Écran de Login) */
    /* On cible spécifiquement le bouton contenu dans le conteneur de login */
    #nc-root div[class*="LoginContainer"] button,
    #nc-root div[class*="login"] button,
    #nc-root button[class*="StyledAuthenticationPageButton"] {
      background-color: #1D9E75 !important;
      color: #ffffff !important;
      border: none !important;
      box-shadow: none !important;
    }
    #nc-root div[class*="LoginContainer"] button:hover,
    #nc-root button[class*="StyledAuthenticationPageButton"]:hover {
      background-color: #0b6e50 !important;
    }

    /* 3. BOUTON DE PUBLICATION / ENREGISTREMENT UNIQUEMENT (Dans l'éditeur d'article) */
    /* On cible uniquement les boutons de sauvegarde tout en haut à droite de l'éditeur */
    #nc-root header[class*="AppHeader"] div[class*="ActionsMenu"] button,
    #nc-root button[class*="Button-button-Primary"] {
      background-color: #1D9E75 !important;
      color: #ffffff !important;
      border: none !important;
    }
    #nc-root header[class*="AppHeader"] div[class*="ActionsMenu"] button:hover,
    #nc-root button[class*="Button-button-Primary"]:hover {
      background-color: #0b6e50 !important;
    }

    /* 4. TEXTES & LIENS DE LA BARRE LATÉRALE (Sidebar) */
    #nc-root h1, 
    #nc-root h2, 
    #nc-root p,
    #nc-root sidebar a,
    #nc-root span {
      font-family: 'Helvetica', serif !important;
    }

    /* Liens actifs ou survolés dans la barre latérale */
    #nc-root a[aria-current="page"], 
    #nc-root a:hover {
      color: #1D9E75 !important;
    }

    /* ==========================================================================
       5. STYLISATION INDIVIDUELLE DES TITRES DE CHAMPS (LABELS)
       ========================================================================== */
    
    /* Style COMMUN de base pour TOUS les labels du CMS */
    #nc-root label {
      font-family: 'Helvetica', serif !important;
      text-transform: uppercase !important;
      letter-spacing: 1px !important;
    }

    /* --- CIBLAGE TEXTUEL UNIQUE (Fonctionne à 100%) --- */

    /* 1. Cible le label qui contient exactement le texte de ton premier champ */
    #nc-root  div:has(> label:contains("ARTICLE À LA UNE")) label,
    #nc-root  label:contains("ARTICLE À LA UNE") {
      color: #1D9E75 !important; /* Vert radar */
      font-size: 14px !important;
      font-weight: 900 !important;
    }

    /* 2. Cible le champ de ta première sidebar */
    #nc-root  div:has(> label:contains("SIDEBAR : PREMIER ARTICLE")) label,
    #nc-root  label:contains("SIDEBAR : PREMIER ARTICLE") {
      color: #062016 !important; /* Vert foncé */
      font-size: 13px !important;
    }

    /* 3. Exemple pour un autre champ comme la Description */
    #nc-root  div:has(> label:contains("Description")) label,
    #nc-root  label:contains("Description") {
      color: #708078 !important;
      font-size: 12px !important;
    }

  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
