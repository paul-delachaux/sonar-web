local_backend: true
backend:
  name: github
  repo: paul-delachaux/sonar-web 
  branch: main
  base_url: https://sonar-oauth-media.vercel.app # 👈 L'adresse de ta passerelle
  auth_endpoint: auth # 👈 L'adresse de ta passerelle
  allowed_users:
    - paul-delachaux
    - souslesonar-hash

media_folder: "public/assets/uploads" # Où seront stockées les images
public_folder: "/assets/uploads"


collections:
  - name: "articles"
    label: "Articles"
    folder: "src/content/articles"
    create: true
    slug: "{{slug}}"
    fields:

      - { label: "CREATION DE L'ARTICLE", name: "sep_article", widget: "separator", required: false}
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["politique", "culture", "societe", "technologie"] }
      
      # --- IMAGES ---
      - { label: "Image de miniature", name: "image", widget: "image", hint: "Sert de miniature globale et d'image d'article par défaut" }
      - { label: "Image interne de l'article (Optionnelle)", name: "article_image", widget: "image", required: false, hint: "Si laissée vide, l'image de miniature sera utilisée" }
      
      - { label: "Visible sur le site ?", name: "isVisible", widget: "boolean", default: true, required: false }

      # --- INFOS AUTEUR & LECTURE ---
      - label: "Auteur de l'article"
        name: "author"
        widget: "select"
        options:
          - { label: "Victor Zhâ", value: "Victor Zhâ" }
          - { label: "Paul Delachaux", value: "Paul Delachaux" }
      - { label: "Temps de lecture (minutes)", name: "reading_time", widget: "number", default: 5, value_type: "int" }

      # ==========================================
      # BLOCS TRANSPARENCE JOURNALISTIQUE (BAS)
      # ==========================================
      - { label: "À propos de l'auteur", name: "author_about", widget: "text", default: "Travailleur acharné..." }
      - { label: "Déclaration d'intérêt", name: "author_interests", widget: "text", default: "N'a pas de liens d'intérêts avec..." }
      
      - label: "Sources consultables"
        name: "consulted_sources"
        widget: "list"
        summary: "{{fields.source_title}}"
        required: false
        fields:
          - { label: "Nom de la source (ex: Article du Monde)", name: "source_title", widget: "string" }
          - { label: "Lien URL (Optionnel)", name: "source_url", widget: "string", required: false }
      - { label: "Corps de l'article (Contenu)", name: "body", widget: "markdown" }

      - { label: "Tweet à intégrer (Optionnel)", name: "tweet_url", widget: "string", required: false, hint: "Colle l'URL complète du tweet, ex: https://x.com/nom_utilisateur/status/123456789" }

      # ==========================================
      # CONFIGURATION GRAPHIQUE DE LA MINIATURE
      # ==========================================
      - { label: "CONFIGURATION GRAPHIQUE DE LA MINIATURE (optionnel)", name: "sep_miniature", widget: "separator", required: false, collapsed: true }
      - { label: "Image Fond Miniature", name: "thumbnail_bg", widget: "image", required: false, title: "Partie Miniature (optionnel)" }
      - label: "Position du fond"
        name: "thumbnail_bg_position"
        widget: "select"
        default: "center"
        required: false
        options:
          - { label: "Centre", value: "center" }
          - { label: "Haut", value: "top" }
          - { label: "Bas", value: "bottom" }
          - { label: "Gauche", value: "left" }
          - { label: "Droite", value: "right" }
          - { label: "Haut gauche", value: "top left" }
          - { label: "Haut droite", value: "top right" }
          - { label: "Bas gauche", value: "bottom left" }
          - { label: "Bas droite", value: "bottom right" }
      - { label: "Zoom du fond (%)", name: "thumbnail_bg_zoom", widget: "number", default: 100, value_type: "int", min: 50, max: 300, required: false }

      # --- CONFIG DU TITRE ---
      - { label: "Titre sur la Miniature", name: "thumbnail_title", widget: "string", required: false }
      - { label: "Position X Titre (en px)", name: "title_x", widget: "number", default: 20, value_type: "int", min: 0, max: 500, required: false }
      - { label: "Position Y Titre (en px)", name: "title_y", widget: "number", default: 20, value_type: "int", min: 0, max: 300, required: false }
      - { label: "Taille police titre (px)", name: "title_size", widget: "number", default: 24, value_type: "int", min: 8, max: 80, required: false }
      - label: "Épaisseur police titre"
        name: "title_weight"
        widget: "select"
        default: "700"
        required: false
        options:
          - { label: "Fin (300)", value: "300" }
          - { label: "Normal (400)", value: "400" }
          - { label: "Gras (700)", value: "700" }
          - { label: "Ultra-Gras (900)", value: "900" }
      - label: "Police titre"
        name: "title_font"
        widget: "select"
        default: "sans-serif"
        required: false
        options:
          - { label: "Moderne (Sans-Serif)", value: "sans-serif" }
          - { label: "Journal (Serif)", value: "serif" }
          - { label: "Code (Monospace)", value: "monospace" }
      - { label: "Couleur titre (ex: #ffffff)", name: "title_color", widget: "color", default: "#ffffff", required: false }

      # --- CONFIG DES BLOCS DE DESCRIPTION ---
      - label: "Blocs de description sur la Miniature"
        name: "thumbnail_descs"
        widget: "list"
        required: false
        summary: "{{fields.line}}"
        fields:
          - { label: "Texte", name: "line", widget: "string" }
          - { label: "Position X (px)", name: "x", widget: "number", default: 20, value_type: "int", min: 0, max: 500 }
          - { label: "Position Y (px)", name: "y", widget: "number", default: 80, value_type: "int", min: 0, max: 300 }
          - { label: "Taille police (px)", name: "size", widget: "number", default: 14, value_type: "int", min: 8, max: 60 }
          - label: "Épaisseur"
            name: "weight"
            widget: "select"
            default: "400"
            options:
              - { label: "Fin (300)", value: "300" }
              - { label: "Normal (400)", value: "400" }
              - { label: "Gras (700)", value: "700" }
              - { label: "Ultra-Gras (900)", value: "900" }
          - label: "Police"
            name: "font"
            widget: "select"
            default: "sans-serif"
            options:
              - { label: "Moderne (Sans-Serif)", value: "sans-serif" }
              - { label: "Journal (Serif)", value: "serif" }
              - { label: "Code (Monospace)", value: "monospace" }
          - { label: "Couleur (ex: #e1e8ed)", name: "color", widget: "color", default: "#e1e8ed" }

      - { label: "Utiliser la miniature custom ?", name: "use_thumbnail", widget: "boolean", default: false, required: false }

  - name: "settings"
    label: "Paramètres"
    delete: false # Empêche la suppression du fichier de config
    editor:
      preview: false
    files:
      - name: "homepage"
        label: "Configuration Accueil"
        file: "src/data/settings.json" # Chemin où sera stocké le choix
        fields:

           # --- ARTICLE A LA UNE ---
          - { label: "Article à la une", name: "sep_article_une", widget: "separator", required: false }
          - label: "Article à la une"
            name: "heroArticle"
            widget: "relation"
            collection: "articles" # Le nom de votre collection d'articles
            search_fields: ["title"]
            value_field: "{{slug}}" # Ou "id", la valeur unique de l'article
            display_fields: ["title"]

          # --- SECTION DROITE (HAUT - LONG) ---
          - { label: "Première sidebar", name: "sep_sidebar_long", widget: "separator", required: false }
          - label: "Sidebar : Premier article (Format Long)"
            name: "sidebarLongArticle"
            widget: "relation"
            collection: "articles"
            search_fields: ["title"]
            value_field: "{{slug}}"
            display_fields: ["title"]
            required: false

          # --- SECTION DROITE (BAS - DEUX PETITS) ---
          - label: "Sidebar : Deux articles du bas"
            name: "sidebarSmallArticles"
            widget: "list"
            summary: "Article : {{article}}"
            min: 0
            max: 2
            allow_duplicate: false
            required: false
            field:
              label: "Article"
              name: "article"
              widget: "relation"
              collection: "articles"
              search_fields: ["title"]
              value_field: "{{slug}}"
              display_fields: ["title"]
              required: false

          # --- SECTION DU BAS (TROIS ARTICLES) ---
          - { label: "Deuxième sidebar", name: "sep_sidebar_mid", widget: "separator", required: false }
          - label: "Rangée du bas (Maximum 3 articles)"
            name: "bottomArticles"
            widget: "list"
            summary: "Article : {{article}}"
            min: 0
            max: 3
            allow_duplicate: false
            required: false
            field:
              label: "Article"
              name: "article"
              widget: "relation"
              collection: "articles"
              search_fields: ["title"]
              value_field: "{{slug}}"
              display_fields: ["title"]
              required: false

          - label: "Styles de la rangée du bas"
            name: "bottomArticlesStyles"
            widget: "list"
            summary: "Configuration du style — Taille : {{titleSize}}, Police : {{titleFont}}"
            min: 0
            max: 3
            required: false
            fields:
              - label: "Taille du titre"
                name: "titleSize"
                widget: "select"
                default: "1.2rem"
                required: false
                options:
                  - { label: "Petit (1rem)", value: "1rem" }
                  - { label: "Normal (1.2rem)", value: "1.2rem" }
                  - { label: "Grand (1.6rem)", value: "1.6rem" }

              - label: "Épaisseur du titre"
                name: "titleWeight"
                widget: "select"
                default: "700"
                required: false
                options:
                  - { label: "Fin (300)", value: "300" }
                  - { label: "Normal (400)", value: "400" }
                  - { label: "Gras (700)", value: "700" }
                  - { label: "Ultra-Gras (900)", value: "900" }

              - label: "Style de police"
                name: "titleFont"
                widget: "select"
                default: "sans-serif"
                required: false
                options:
                  - { label: "Moderne (Sans-Serif)", value: "sans-serif" }
                  - { label: "Journal / Classique (Serif)", value: "serif" }
                  - { label: "Code (Monospace)", value: "monospace" }

          # --- NOUVELLE SECTION : LES 3 ARTICLES SUPERPOSÉS (GAUCHE) ---
          - { label: "Troisième sidebar", name: "sep_sidebar_left", widget: "separator", required: false }
          - label: "Asymétrique : 3 Articles Superposés (Gauche)"
            name: "asymLeftArticles"
            widget: "list"
            summary: "Article : {{article}}"
            min: 0
            max: 3
            allow_duplicate: false
            required: false
            field:
              label: "Article"
              name: "article"
              widget: "relation"
              collection: "articles"
              search_fields: ["title"]
              value_field: "{{slug}}"
              display_fields: ["title"]
              required: false

          - label: "Asymétrique : Styles des 3 articles superposés"
            name: "asymLeftStyles"
            widget: "list"
            summary: "Style — Taille : {{titleSize}}, Police : {{titleFont}}"
            min: 0
            max: 3
            required: false
            fields:
              - label: "Taille du titre"
                name: "titleSize"
                widget: "select"
                default: "1.1rem"
                required: false
                options:
                  - { label: "Petit (1rem)", value: "1rem" }
                  - { label: "Normal (1.1rem)", value: "1.1rem" }
                  - { label: "Grand (1.4rem)", value: "1.4rem" }
              - label: "Épaisseur du titre"
                name: "titleWeight"
                widget: "select"
                default: "700"
                required: false
                options:
                  - { label: "Fin (300)", value: "300" }
                  - { label: "Normal (400)", value: "400" }
                  - { label: "Gras (700)", value: "700" }
              - label: "Style de police"
                name: "titleFont"
                widget: "select"
                default: "sans-serif"
                required: false
                options:
                  - { label: "Moderne (Sans-Serif)", value: "sans-serif" }
                  - { label: "Journal (Serif)", value: "serif" }
                  - { label: "Code (Monospace)", value: "monospace" }

          # --- NOUVELLE SECTION : LE GRAND ARTICLE UNIQUE (DROITE) ---
          - { label: "Article géant", name: "sep_giant_article", widget: "separator", required: false }
          - label: "Asymétrique : Grand Article Principal (Droite)"
            name: "asymRightArticle"
            widget: "relation"
            collection: "articles"
            search_fields: ["title"]
            value_field: "{{slug}}"
            display_fields: ["title"]
            required: false

          - label: "Asymétrique : Style du Grand Article"
            name: "asymRightStyle"
            widget: "object"
            required: false
            fields:
              - label: "Taille du titre"
                name: "titleSize"
                widget: "select"
                default: "1.8rem"
                required: false
                options:
                  - { label: "Normal (1.5rem)", value: "1.5rem" }
                  - { label: "Grand (1.8rem)", value: "1.8rem" }
                  - { label: "Géant (2.2rem)", value: "2.2rem" }
              - label: "Épaisseur du titre"
                name: "titleWeight"
                widget: "select"
                default: "700"
                required: false
                options:
                  - { label: "Normal (400)", value: "400" }
                  - { label: "Gras (700)", value: "700" }
              - label: "Style de police"
                name: "titleFont"
                widget: "select"
                default: "sans-serif"
                required: false
                options:
                  - { label: "Moderne (Sans-Serif)", value: "sans-serif" }
                  - { label: "Journal (Serif)", value: "serif" }
                  - { label: "Code (Monospace)", value: "monospace" }

              

